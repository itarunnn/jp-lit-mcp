name: Publish Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      package-ref:
        description: "Git ref to publish, such as v0.7.7"
        required: true
        default: "v0.7.7"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Resolve publish ref
        id: publish-ref
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.package-ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out package ref
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.publish-ref.outputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish to npm
        run: npm publish
